apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: retail-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout
  template:
    metadata:
      labels:
        app: checkout
    spec:
      containers:
        - name: checkout
          image: checkout:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: CART_URL
              value: "http://cart.retail-store.svc.cluster.local:5000"
            - name: CATALOG_URL
              value: "http://catalog.retail-store.svc.cluster.local:5000"
            - name: ORDERS_URL
              value: "http://orders.retail-store.svc.cluster.local:5000"
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
---
apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: retail-store
spec:
  selector:
    app: checkout
  ports:
    - port: 5000
      targetPort: 5000
