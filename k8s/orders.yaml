apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: retail-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: orders:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "200m", memory: "128Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 5
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
            initialDelaySeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: retail-store
spec:
  selector:
    app: orders
  ports:
    - port: 5000
      targetPort: 5000
