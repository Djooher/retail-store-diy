apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: retail-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: ui:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: CATALOG_URL
              value: "http://catalog.retail-store.svc.cluster.local:5000"
            - name: CART_URL
              value: "http://cart.retail-store.svc.cluster.local:5000"
            - name: CHECKOUT_URL
              value: "http://checkout.retail-store.svc.cluster.local:5000"
          livenessProbe:
            httpGet: { path: /health, port: 5000 }
          readinessProbe:
            httpGet: { path: /health, port: 5000 }
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: retail-store
spec:
  selector:
    app: ui
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retail-ingress
  namespace: retail-store
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ui
                port:
                  number: 5000
